server:
  port: ${SERVER_PORT:8080}
  address: ${SERVER_ADDRESS:0.0.0.0}
  servlet:
    context-path: /api

spring:
  config:
    import: optional:file:.env[.properties],optional:file:src/main/.env[.properties]
  servlet:
    multipart:
      max-file-size: 1GB
      max-request-size: 2GB

  application:
    name: audiobook-api
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/audio_book}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:12345}
    driver-class-name: com.mysql.cj.jdbc.Driver
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  jpa:
    database-platform: org.hibernate.dialect.MySQL8Dialect
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        jdbc:
          time_zone: Asia/Ho_Chi_Minh
        temp:
          use_jdbc_metadata_defaults: false

  jackson:
    time-zone: Asia/Ho_Chi_Minh
    serialization:
      write-dates-as-timestamps: false

logging:
  level:
    root: INFO
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info
app:
  jwt:
    secret: ${JWT_SECRET:fa71d57726140a7b7f9713c900ce79f1820fbdcb3f7bfa14a45c64ae31820c1c}
    expiration: ${JWT_EXPIRATION:86400000}
    issuer: ${JWT_ISSUER:audio-book}

google:
  oauth:
    client-id: ${GOOGLE_OAUTH_CLIENT_ID:464204505958-tkr8t1c9gfla01kqmuom6thrdnqjgpgj.apps.googleusercontent.com}

storage:
  aws:
    access-key: ${AWS_ACCESS_KEY:}
    secret-key: ${AWS_SECRET_KEY:}
    region: ${AWS_REGION:ap-southeast-1}
    bucket-name: ${AWS_BUCKET_NAME:}
  max-file-size: 1073741824 # 1GB
  max-total-file-size: 2147483648 # 2GB
  allowed-document-extensions: pdf, doc, docx, xls, xlsx
  allowed-image-extensions: png, jpg, jpeg
payment:
  stripe:
    secret-key: ${STRIPE_SECRET_KEY:}
    publishable-key: ${STRIPE_PUBLISHABLE_KEY:}
    webhook-secret: ${STRIPE_WEBHOOK_SECRET:}
    success-url: ${STRIPE_SUCCESS_URL:http://localhost:3000/payment/success}
    cancel-url: ${STRIPE_CANCEL_URL:http://localhost:3000/payment/cancel}
