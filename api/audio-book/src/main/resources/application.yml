server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: audiobook-api

  datasource:
    url: jdbc:postgresql://localhost:5432/audiobook
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  jackson:
    time-zone: Asia/Ho_Chi_Minh
    serialization:
      write-dates-as-timestamps: false

logging:
  level:
    root: INFO
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  jwt:
    secret: dev-secret-key
    expiration: 86400000