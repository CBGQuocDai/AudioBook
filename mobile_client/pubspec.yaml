name: mobile_client
description: A new Flutter audiobook project

publish_to: "none"

version: 1.0.32+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6
  path_provider: ^2.1.4

  # state management
  provider: ^6.1.2

  # load network image
  cached_network_image: ^3.3.1

  # icon
  flutter_svg: ^2.0.10+1

  # network
  http: ^1.2.2

  # stripe payment sheet
  flutter_stripe: ^11.1.0

  # local storage
  shared_preferences: ^2.3.2

  # pick image from camera/gallery
  image_picker: ^1.1.2

  # pick document/audio files for chapters
  file_picker: ^8.1.2

  # open ebook/audio/image urls from backend
  url_launcher: ^6.3.1

  # reading pdf
  flutter_pdfview: ^1.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.2

flutter:

  uses-material-design: true

  assets:
    - assets/images/